# OpenFang вЂ” Railway-ready Compose file
#
# Railway deployment (Dockerfile mode вЂ” recommended):
#   Railway builds via the Dockerfile and injects PORT automatically.
#   The entrypoint derives OPENFANG_LISTEN from PORT вЂ” no manual wiring needed.
#   Add a Volume mounted at /data in Railway service settings.
#   Set at least one LLM key (e.g. GROQ_API_KEY) in Railway Variables.
#
# Railway compose-import mode (drag-and-drop onto canvas):
#   Railway will create a service and import the variables below as Railway Variables.
#
# Local development:
#   cp .env.example .env && docker compose up --build

services:
  openfang:
    build: .
    # image: ghcr.io/rightnow-ai/openfang:latest  # Uncomment once GHCR image is public
    ports:
      - "${PORT:-4200}:${PORT:-4200}"
    volumes:
      - openfang-data:/data
    environment:
      # в”Ђв”Ђ Core в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - OPENFANG_HOME=/data
      - OPENFANG_API_KEY=${OPENFANG_API_KEY:-}
      - RUST_LOG=${RUST_LOG:-info}

      # в”Ђв”Ђ LLM Provider API Keys вЂ” set at least one в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}

      # в”Ђв”Ђ Ollama sidecar (Railway private network) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Add an Ollama service to your Railway project, then set:
      #   OLLAMA_BASE_URL=http://${{ollama.RAILWAY_PRIVATE_DOMAIN}}:11434
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}

      # в”Ђв”Ђ Web Search в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}

      # в”Ђв”Ђ Channel Tokens вЂ” enable only what you use в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:-}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID:-}
      - SIGNAL_PHONE_NUMBER=${SIGNAL_PHONE_NUMBER:-}
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN:-}
      - EMAIL_IMAP_HOST=${EMAIL_IMAP_HOST:-}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-}
      - EMAIL_USERNAME=${EMAIL_USERNAME:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD:-}
      - MATTERMOST_TOKEN=${MATTERMOST_TOKEN:-}
      - TWITCH_OAUTH_TOKEN=${TWITCH_OAUTH_TOKEN:-}
      - DINGTALK_ACCESS_TOKEN=${DINGTALK_ACCESS_TOKEN:-}
      - DINGTALK_SECRET=${DINGTALK_SECRET:-}
      - GOOGLE_CHAT_SERVICE_ACCOUNT=${GOOGLE_CHAT_SERVICE_ACCOUNT:-}
      - ROCKETCHAT_TOKEN=${ROCKETCHAT_TOKEN:-}
      - ZULIP_API_KEY=${ZULIP_API_KEY:-}

    healthcheck:
      # Railway healthchecks use HTTP against PORT/api/health вЂ” this mirrors that locally.
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-4200}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  openfang-data:
